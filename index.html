<style>
  :root {
    --bg: #17181c;
    --bg-panel: #101114;
    --bg-elevated: #1e2025;
    --border: #2a2c32;
    --text: #ececf1;
    --text-dim: #8a8d94;
    --accent: #4285f4;
    --accent-2: #7c5cff;
    --accent-soft: rgba(66, 133, 244, 0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  body {
    display: flex;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #33353c; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #44464e; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 264px;
    background: var(--bg-panel);
    padding: 14px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 4px 18px;
  }
  .brand-mark {
    width: 34px; height: 34px;
    border-radius: 9px;
    flex-shrink: 0;
    animation: markPulse 4s ease-in-out infinite;
    box-shadow: 0 0 22px rgba(66,133,244,0.45);
  }
  .brand-mark img {
    width: 100%; height: 100%;
    border-radius: 9px;
    display: block;
  }
  @keyframes markPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  .brand-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  .new-chat-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s ease, transform 0.15s ease, background 0.2s ease;
  }
  .new-chat-btn:hover { border-color: var(--accent); background: #23252b; transform: translateX(2px); }
  .new-chat-btn:active { transform: scale(0.98); }
  .new-chat-btn svg { flex-shrink: 0; }

  .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .chat-item {
    padding: 10px 12px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 13.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    border: 1px solid transparent;
    transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    opacity: 0;
    animation: itemIn 0.35s ease forwards;
  }
  @keyframes itemIn {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .chat-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-item:hover { background: var(--bg-elevated); color: var(--text); transform: translateX(3px); }
  .chat-item.active { background: var(--accent-soft); color: var(--text); border-color: rgba(66,133,244,0.35); }
  .delete-btn {
    background: none; border: none; color: #66686f; cursor: pointer;
    font-size: 13px; opacity: 0; transition: opacity 0.15s ease, color 0.15s ease;
    flex-shrink: 0;
  }
  .chat-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #ff5c5c; }

  .sidebar-foot {
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: #55575e;
    text-align: center;
  }

  /* ---------- Main chat area ---------- */
  .chat-area { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; }
  .header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }

  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0 24px;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    gap: 22px;
  }
  .empty-glow {
    width: 72px; height: 72px;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(66,133,244,0.4);
    animation: floaty 3.5s ease-in-out infinite;
  }
  .empty-glow img { width: 100%; height: 100%; border-radius: 20px; display: block; }
  @keyframes floaty {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  .empty-state h2 { font-size: 22px; font-weight: 700; }
  .empty-state p { color: var(--text-dim); font-size: 14px; max-width: 380px; line-height: 1.5; }
  .suggestion-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(160px, 1fr));
    gap: 10px;
    max-width: 520px;
    width: 100%;
  }
  .suggestion-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    text-align: left;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s ease, transform 0.15s ease, color 0.2s ease;
  }
  .suggestion-card:hover {
    border-color: var(--accent);
    color: var(--text);
    transform: translateY(-2px);
  }
  .suggestion-card b { display: block; color: var(--text); font-size: 13.5px; margin-bottom: 2px; }

  .message-row {
    width: 100%;
    display: flex;
    padding: 22px 20px;
    opacity: 0;
    transform: translateY(16px);
    animation: messageFadeIn 0.35s forwards ease-out;
  }
  .message-row.velto { background: rgba(255,255,255,0.02); }
  @keyframes messageFadeIn { to { opacity: 1; transform: translateY(0); } }

  .message-content { max-width: 720px; margin: 0 auto; width: 100%; }
  .msg-top { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; }
  .avatar-icon {
    width: 26px; height: 26px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .user .avatar-icon { background: #34363d; color: var(--text); }
  .velto .avatar-icon { padding: 0; overflow: hidden; }
  .velto .avatar-icon img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-name { font-weight: 600; font-size: 13.5px; }

  .msg-text {
    font-size: 15px;
    line-height: 1.65;
    white-space: pre-wrap;
    padding-left: 35px;
  }
  .msg-actions {
    display: flex; gap: 6px; margin-top: 8px; padding-left: 35px;
    opacity: 0; transition: opacity 0.15s ease;
  }
  .message-row:hover .msg-actions { opacity: 1; }
  .msg-action-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 6px; padding: 4px 9px; font-size: 11.5px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .msg-action-btn:hover { color: var(--text); border-color: var(--accent); }

  .engine-info {
    font-size: 11px;
    color: #61646c;
    margin-top: 6px;
    padding-left: 35px;
    font-style: italic;
  }

  .typing-indicator { display: flex; align-items: center; gap: 6px; padding-left: 35px; height: 20px; }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  /* ---------- Input ---------- */
  .input-container { padding: 16px 20px 20px; display: flex; justify-content: center; }
  .input-box-wrapper {
    max-width: 720px;
    width: 100%;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--bg-elevated);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .input-box-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(66, 133, 244, 0.15);
  }
  textarea {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    resize: none;
    max-height: 160px;
    min-height: 24px;
    font-size: 15px;
    line-height: 1.5;
    outline: none;
    font-family: inherit;
    padding-top: 4px;
  }
  textarea::placeholder { color: #63656c; }

  button.send-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    border: none;
    width: 38px; height: 38px;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  button.send-btn:hover:not(:disabled) { transform: scale(1.06); }
  button.send-btn:active:not(:disabled) { transform: scale(0.94); }
  button.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint-text { text-align: center; font-size: 11px; color: #52545b; margin-top: 8px; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 9px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Auth screen ---------- */
  #authScreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 2000;
    padding: 20px;
  }
  .auth-card {
    width: 100%; max-width: 380px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    animation: authIn 0.4s ease;
  }
  @keyframes authIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .auth-logo { display: flex; justify-content: center; margin-bottom: 14px; }
  .auth-logo img { width: 52px; height: 52px; border-radius: 14px; box-shadow: 0 0 30px rgba(66,133,244,0.4); }
  .auth-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .auth-subtitle { text-align: center; font-size: 13px; color: var(--text-dim); margin-bottom: 22px; }
  .auth-field { margin-bottom: 14px; }
  .auth-field label { display: block; font-size: 12.5px; color: var(--text-dim); margin-bottom: 6px; }
  .auth-field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 9px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    font-family: inherit;
  }
  .auth-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(66,133,244,0.15);
  }
  .auth-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    border: none;
    padding: 11px;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .auth-submit:hover:not(:disabled) { transform: translateY(-1px); }
  .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-error {
    background: rgba(255, 76, 76, 0.1);
    border: 1px solid rgba(255,76,76,0.3);
    color: #ff8080;
    font-size: 12.5px;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 14px;
    display: none;
  }
  .auth-error.show { display: block; }
  .auth-switch {
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 18px;
  }
  .auth-switch a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: 600; }
  .auth-switch a:hover { text-decoration: underline; }

  .verify-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    animation: floaty 3s ease-in-out infinite;
  }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: 9px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    font-size: 12.5px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .user-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #3ddc84; flex-shrink: 0; }
  .logout-btn {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 12px; margin-left: auto; padding: 2px 6px; border-radius: 6px;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .logout-btn:hover { color: #ff5c5c; background: rgba(255,92,92,0.1); }
</style>
</head>

  const authScreen = document.getElementById('authScreen');
  const authCard = document.getElementById('authCard');

  let currentUser = null;
  let verifyPollTimer = null;

  function renderLoginForm(errorMsg) {
    authCard.innerHTML = `
      <div class="auth-logo"><img src="${LOGO_SRC}" alt="Velto"></div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Log in to continue to Velto AI</div>
      <div class="auth-error ${errorMsg ? 'show' : ''}" id="authError">${errorMsg || ''}</div>
      <form id="loginForm">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="loginEmail" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-submit" id="loginBtn">Log in</button>
      </form>
      <div class="auth-switch">Don't have an account? <a id="toSignup">Sign up</a></div>
    `;
    document.getElementById('toSignup').onclick = () => renderSignupForm();
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        renderLoginForm(friendlyAuthError(err));
      }
    };
  }

  function renderSignupForm(errorMsg) {
    authCard.innerHTML = `
      <div class="auth-logo"><img src="${LOGO_SRC}" alt="Velto"></div>
      <div class="auth-title">Create your account</div>
      <div class="auth-subtitle">Get started with Velto AI — it's free</div>
      <div class="auth-error ${errorMsg ? 'show' : ''}" id="authError">${errorMsg || ''}</div>
      <form id="signupForm">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="signupEmail" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="signupPassword" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="auth-submit" id="signupBtn">Sign up</button>
      </form>
      <div class="auth-switch">Already have an account? <a id="toLogin">Log in</a></div>
    `;
    document.getElementById('toLogin').onclick = () => renderLoginForm();
    document.getElementById('signupForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const btn = document.getElementById('signupBtn');
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await sendEmailVerification(cred.user);
      } catch (err) {
        renderSignupForm(friendlyAuthError(err));
      }
    };
  }

  function renderVerifyScreen(user) {
    authCard.innerHTML = `
      <div class="verify-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><polyline points="4 4 12 13 20 4"/></svg>
      </div>
      <div class="auth-title" style="text-align:center;">Verify your email</div>
      <div class="auth-subtitle">We sent a verification link to<br><strong style="color:var(--text)">${escapeAttr(user.email)}</strong></div>
      <div class="auth-error" id="authError"></div>
      <button class="auth-submit" id="resendBtn">Resend email</button>
      <button class="auth-submit" id="checkBtn" style="background:var(--bg-elevated); border:1px solid var(--border); margin-top:10px; color:var(--text);">I've verified — continue</button>
      <div class="auth-switch"><a id="signOutLink">Sign out</a></div>
    `;
    document.getElementById('resendBtn').onclick = async () => {
      const btn = document.getElementById('resendBtn');
      btn.disabled = true; btn.textContent = 'Sending...';
      try {
        await sendEmailVerification(user);
        btn.textContent = 'Sent! Check your inbox';
      } catch (err) {
        btn.disabled = false; btn.textContent = 'Resend email';
        document.getElementById('authError').textContent = friendlyAuthError(err);
        document.getElementById('authError').classList.add('show');
      }
    };
    document.getElementById('checkBtn').onclick = async () => {
      await reload(user);
      if (user.emailVerified) {
        showApp(user);
      } else {
        document.getElementById('authError').textContent = "Still not verified — click the link in your email first.";
        document.getElementById('authError').classList.add('show');
      }
    };
    document.getElementById('signOutLink').onclick = () => signOut(auth);
  }

  function escapeAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function friendlyAuthError(err) {
    const code = err.code || '';
    if (code.includes('email-already-in-use')) return 'That email is already registered — try logging in instead.';
    if (code.includes('invalid-email')) return 'That email address looks invalid.';
    if (code.includes('weak-password')) return 'Password should be at least 6 characters.';
    if (code.includes('user-not-found') || code.includes('wrong-password') || code.includes('invalid-credential')) return 'Incorrect email or password.';
    if (code.includes('too-many-requests')) return 'Too many attempts — please wait a moment and try again.';
    return 'Something went wrong. Please try again.';
  }

  function showApp(user) {
    currentUser = user;
    authScreen.style.display = 'none';
    if (verifyPollTimer) clearInterval(verifyPollTimer);

    const chip = document.getElementById('userChip');
    chip.innerHTML = `
      <div class="user-chip">
        <div class="dot"></div>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeAttr(user.email)}</span>
        <button class="logout-btn" id="logoutBtn">Log out</button>
      </div>
    `;
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // Namespace chat storage per user so accounts don't share history
    window.VELTO_STORAGE_KEY = 'velto_chats_' + user.uid;
    window.VELTO_ACTIVE_KEY = 'velto_active_id_' + user.uid;

    if (window.initVeltoApp) window.initVeltoApp();
  }

  onAuthStateChanged(auth, (user) => {
    authScreen.style.display = 'flex';
    if (!user) {
      renderLoginForm();
    } else if (!user.emailVerified) {
      renderVerifyScreen(user);
      if (verifyPollTimer) clearInterval(verifyPollTimer);
      verifyPollTimer = setInterval(async () => {
        await reload(user);
        if (user.emailVerified) showApp(user);
      }, 4000);
    } else {
      showApp(user);
    }
  });
</script>

    { title: "Debug code", body: "Find the bug in my Python function" },
    { title: "Brainstorm ideas", body: "Give me 5 project ideas using AI" }
  ];

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1600);
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied to clipboard');
    }).catch(() => {
      showToast('Could not copy');
    });
  }

  window.initVeltoApp = function() {
    chats = JSON.parse(localStorage.getItem(window.VELTO_STORAGE_KEY)) || {};
    activeChatId = localStorage.getItem(window.VELTO_ACTIVE_KEY) || null;

    const keys = Object.keys(chats);
    if (keys.length === 0) createNewChat();
    else {
      if (!activeChatId || !chats[activeChatId]) activeChatId = keys[0];
      renderSidebar();
      renderMessages();
    }
    autoResize();
  }

  function saveToStorage() {
    localStorage.setItem(window.VELTO_STORAGE_KEY, JSON.stringify(chats));
    localStorage.setItem(window.VELTO_ACTIVE_KEY, activeChatId);
  }

  function createNewChat() {
    const keys = Object.keys(chats);
    if (keys.length >= 3) {
      showToast("Chat limit reached — delete one first");
      return;
    }
    const id = 'chat_' + Date.now();
    chats[id] = { title: "New Conversation " + (keys.length + 1), history: [] };
    activeChatId = id;
    saveToStorage();
    renderSidebar();
    renderMessages();
  }

  function deleteChat(id, event) {
    event.stopPropagation();
    delete chats[id];
    const keys = Object.keys(chats);
    if (activeChatId === id) activeChatId = keys.length > 0 ? keys[0] : null;
    saveToStorage();
    if (!activeChatId) createNewChat();
    else { renderSidebar(); renderMessages(); }
  }

  function switchChat(id) {
    activeChatId = id;
    saveToStorage();
    renderSidebar();
    renderMessages();
  }

  function renderSidebar() {
    const list = document.getElementById('chatList');
    list.innerHTML = '';
    Object.keys(chats).forEach((id, i) => {
      const div = document.createElement('div');
      div.className = `chat-item ${id === activeChatId ? 'active' : ''}`;
      div.style.animationDelay = (i * 0.05) + 's';
      div.onclick = () => switchChat(id);
      div.innerHTML = `
        <span>${escapeHtml(chats[id].title)}</span>
        <button class="delete-btn" onclick="deleteChat('${id}', event)">✕</button>
      `;
      list.appendChild(div);
    });
  }

  function autoResize() {
    const input = document.getElementById('userInput');
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const text = input.value.trim();

    if (!text || !activeChatId) return;

    input.value = '';
    autoResize();
    input.disabled = true;
    sendBtn.disabled = true;

    chats[activeChatId].history.push({ role: 'user', text: text });

    if (chats[activeChatId].history.length === 1) {
      chats[activeChatId].title = text.substring(0, 25) + (text.length > 25 ? '...' : '');
      renderSidebar();
